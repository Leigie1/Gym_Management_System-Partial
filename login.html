<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Power Fitness Gym</title>
  <link rel="stylesheet" href="global.css"/>
  <link rel="stylesheet" href="login.css"/>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js" defer></script>
  <script>document.addEventListener('DOMContentLoaded',()=>lucide.createIcons());</script>
</head>
<body class="login-body">

  <div class="login-container">
    
    <!-- Forms -->
    <div class="login-forms">
      
      <!-- Tab switcher -->
      <div class="form-tabs">
        <button class="form-tab active" onclick="switchTab('login')">Login</button>
        <button class="form-tab" onclick="switchTab('register')">Register</button>
      </div>

      <!-- LOGIN FORM -->
      <div class="form-panel active" id="loginPanel">
        <h2 class="form-title">Sign In</h2>
        <p class="form-subtitle">Enter your credentials to access your account</p>

        <form class="auth-form" onsubmit="handleLogin(event)">
          <div class="form-group">
            <label>Email Address</label>
            <div class="input-with-icon">
              <i data-lucide="mail"></i>
              <input type="email" class="form-control" placeholder="admin@powergym.com" required/>
            </div>
          </div>

          <div class="form-group">
            <label>Password</label>
            <div class="input-with-icon">
              <i data-lucide="lock"></i>
              <input type="password" class="form-control" placeholder="Enter your password" required/>
            </div>
          </div>

          <div class="form-options">
            <label class="checkbox-label">
              <input type="checkbox"/>
              <span>Remember me</span>
            </label>
            <a href="#" class="link-accent" onclick="showForgotPassword(event)">Forgot Password?</a>
          </div>

          <button type="submit" class="btn btn--primary btn-full">
            <i data-lucide="log-in"></i>
            Sign In
          </button>
        </form>
      </div>

      <!-- REGISTER FORM -->
      <div class="form-panel" id="registerPanel">
        <h2 class="form-title">Create Account</h2>
        <p class="form-subtitle">Register to start managing your gym</p>

        <form class="auth-form" onsubmit="handleRegister(event)">
          <div class="form-row">
            <div class="form-group">
              <label>First Name</label>
              <input type="text" class="form-control" placeholder="John" required/>
            </div>
            <div class="form-group">
              <label>Last Name</label>
              <input type="text" class="form-control" placeholder="Doe" required/>
            </div>
          </div>

          <div class="form-group">
            <label>Email Address</label>
            <div class="input-with-icon">
              <i data-lucide="mail"></i>
              <input type="email" class="form-control" placeholder="you@example.com" required/>
            </div>
          </div>

          <div class="form-group">
            <label>Phone Number</label>
            <div class="input-with-icon">
              <i data-lucide="phone"></i>
              <input type="tel" class="form-control" placeholder="09XX XXX XXXX" required/>
            </div>
          </div>

          <div class="form-group">
            <label>Password</label>
            <div class="input-with-icon">
              <i data-lucide="lock"></i>
              <input type="password" class="form-control" placeholder="Create a strong password" required/>
            </div>
          </div>

          <div class="form-group">
            <label>Confirm Password</label>
            <div class="input-with-icon">
              <i data-lucide="lock"></i>
              <input type="password" class="form-control" placeholder="Re-enter your password" required/>
            </div>
          </div>

          <label class="checkbox-label">
            <input type="checkbox" required/>
            <span>I agree to the Terms & Conditions</span>
          </label>

          <button type="submit" class="btn btn--primary btn-full">
            <i data-lucide="user-plus"></i>
            Create Account
          </button>
        </form>
      </div>

      <!-- FORGOT PASSWORD PANEL -->
      <div class="form-panel" id="forgotPanel">
        <button class="back-btn" onclick="backToLogin()">
          <i data-lucide="arrow-left"></i>
          Back to Login
        </button>
        
        <h2 class="form-title">Reset Password</h2>
        <p class="form-subtitle">Enter your email to receive a password reset link</p>

        <form class="auth-form" onsubmit="handleForgotPassword(event)">
          <div class="form-group">
            <label>Email Address</label>
            <div class="input-with-icon">
              <i data-lucide="mail"></i>
              <input type="email" class="form-control" placeholder="your@email.com" required/>
            </div>
          </div>

          <button type="submit" class="btn btn--primary btn-full">
            <i data-lucide="send"></i>
            Send Reset Link
          </button>
        </form>

        <div class="reset-info">
          <i data-lucide="info"></i>
          <p>You will receive an email with instructions to reset your password.</p>
        </div>
      </div>

    </div>

  </div>

  <!-- Success Toast -->
  <div class="auth-toast hidden" id="authToast">
    <i data-lucide="check-circle"></i>
    <span id="toastMessage">Success!</span>
  </div>

  <script>
    // Tab switching
    function switchTab(tab) {
      document.querySelectorAll('.form-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
      
      if (tab === 'login') {
        document.querySelectorAll('.form-tab')[0].classList.add('active');
        document.getElementById('loginPanel').classList.add('active');
      } else if (tab === 'register') {
        document.querySelectorAll('.form-tab')[1].classList.add('active');
        document.getElementById('registerPanel').classList.add('active');
      }
      
      lucide.createIcons();
    }

    // Show forgot password
    function showForgotPassword(e) {
      e.preventDefault();
      document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
      document.getElementById('forgotPanel').classList.add('active');
      lucide.createIcons();
    }

    // Back to login
    function backToLogin() {
      document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
      document.getElementById('loginPanel').classList.add('active');
      lucide.createIcons();
    }

    // Show toast
    function showToast(message) {
      const toast = document.getElementById('authToast');
      document.getElementById('toastMessage').textContent = message;
      toast.classList.remove('hidden');
      toast.classList.add('show');
      lucide.createIcons();
      setTimeout(() => {
        toast.classList.remove('show');
        setTimeout(() => toast.classList.add('hidden'), 400);
      }, 3000);
    }

    // Handle login
    function handleLogin(e) {
      e.preventDefault();
      // Add your login logic here
      showToast('Login successful! Redirecting...');
      setTimeout(() => {
        window.location.href = 'dashboard.html';
      }, 1500);
    }

    // Handle register
    function handleRegister(e) {
      e.preventDefault();
      // Add your registration logic here
      showToast('Account created successfully!');
      setTimeout(() => {
        switchTab('login');
      }, 2000);
    }

    // Handle forgot password
    function handleForgotPassword(e) {
      e.preventDefault();
      // Add your forgot password logic here
      showToast('Password reset link sent to your email!');
      setTimeout(() => {
        backToLogin();
      }, 2000);
    }
  </script>
</body>
</html>
